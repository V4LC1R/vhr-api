server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Otimização para Favicon e Robots.txt (Evita lotar os logs do Docker)
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        fastcgi_read_timeout 300;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Cache agressivo para assets estáticos (CSS, JS, Imagens, Fontes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
        add_header Cache-Control "public, no-transform";
    }

    # Bloqueia arquivos ocultos (Ex: .env, .git). O (?!well-known) protege Let's Encrypt
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Proteção extra para arquivos sensíveis caso vazem para a public (opcional, mas boa prática)
    location ~* /(artisan|composer|package.json|vite.config.js|webpack.mix.js) {
        deny all;
    }

    # Gzip Otimizado
    gzip on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}