name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancela runs antigos do mesmo branch/PR quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Testes (PHPUnit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          # pdo_pgsql/pgsql: Testcontainers Postgres | redis: cache (phpredis)
          extensions: pdo_pgsql, pgsql, redis, mbstring, bcmath, intl
          coverage: none

      # O DBTestCase (Testcontainers) conecta em host.docker.internal, que não
      # existe no runner Linux. Os containers publicam as portas no host, então
      # apontamos esse nome para o loopback onde as portas ficam acessíveis.
      - name: Mapear host.docker.internal -> loopback
        run: echo "127.0.0.1 host.docker.internal" | sudo tee -a /etc/hosts

      - name: Instalar dependências (Composer)
        uses: ramsey/composer-install@v3

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Rodar testes
        run: php artisan test
